<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <defs>
    <filter id="glow-scoop">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-scoop-soft">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="80" height="80" fill="#1C1C1C"/>
  <!-- Scanlines -->
  <line x1="0" y1="4" x2="80" y2="4" stroke="#E3DBD2" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="8" x2="80" y2="8" stroke="#E3DBD2" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="12" x2="80" y2="12" stroke="#E3DBD2" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="16" x2="80" y2="16" stroke="#E3DBD2" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="20" x2="80" y2="20" stroke="#E3DBD2" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="24" x2="80" y2="24" stroke="#E3DBD2" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="28" x2="80" y2="28" stroke="#E3DBD2" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="32" x2="80" y2="32" stroke="#E3DBD2" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="36" x2="80" y2="36" stroke="#E3DBD2" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="40" x2="80" y2="40" stroke="#E3DBD2" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="44" x2="80" y2="44" stroke="#E3DBD2" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="48" x2="80" y2="48" stroke="#E3DBD2" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="52" x2="80" y2="52" stroke="#E3DBD2" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="56" x2="80" y2="56" stroke="#E3DBD2" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="60" x2="80" y2="60" stroke="#E3DBD2" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="64" x2="80" y2="64" stroke="#E3DBD2" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="68" x2="80" y2="68" stroke="#E3DBD2" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="72" x2="80" y2="72" stroke="#E3DBD2" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="76" x2="80" y2="76" stroke="#E3DBD2" stroke-width="0.5" opacity="0.06"/>
  <!-- Outer frame -->
  <rect x="3" y="3" width="74" height="74" fill="none" stroke="#FF7132" stroke-width="1" opacity="0.5"/>
  <!-- Antenna mast -->
  <line x1="40" y1="52" x2="40" y2="28" stroke="#FF7132" stroke-width="2" filter="url(#glow-scoop-soft)"/>
  <!-- Antenna top triangle -->
  <polyline points="40,18 34,30 46,30" fill="none" stroke="#FF7132" stroke-width="2" filter="url(#glow-scoop-soft)"/>
  <!-- Antenna tip -->
  <circle cx="40" cy="17" r="2.5" fill="#FF7132" filter="url(#glow-scoop-soft)"/>
  <!-- Cross bars -->
  <line x1="34" y1="40" x2="46" y2="40" stroke="#FF7132" stroke-width="1.5" filter="url(#glow-scoop-soft)"/>
  <line x1="36" y1="45" x2="44" y2="45" stroke="#FF7132" stroke-width="1.5" filter="url(#glow-scoop-soft)"/>
  <!-- Base -->
  <rect x="33" y="52" width="14" height="3" rx="1" fill="#FF7132" filter="url(#glow-scoop-soft)"/>
  <!-- Signal waves -->
  <path d="M 30 42 A 11 11 0 0 1 50 42" fill="none" stroke="#FF7132" stroke-width="2" stroke-linecap="round" filter="url(#glow-scoop-soft)"/>
  <path d="M 24 37 A 17 17 0 0 1 56 37" fill="none" stroke="#FF7132" stroke-width="1.5" stroke-linecap="round" opacity="0.7" filter="url(#glow-scoop-soft)"/>
  <path d="M 18 32 A 23 23 0 0 1 62 32" fill="none" stroke="#FF7132" stroke-width="1" stroke-linecap="round" opacity="0.4" filter="url(#glow-scoop-soft)"/>
  <!-- Label -->
  <text x="40" y="73" text-anchor="middle" font-family="monospace" font-size="7" fill="#FF7132">[SCOOP]</text>
</svg>
