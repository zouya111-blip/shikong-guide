<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <defs>
    <pattern id="grid-scoop-bp" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#2A2928" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="80" height="80" fill="#1E2020"/>
  <rect width="80" height="80" fill="url(#grid-scoop-bp)"/>
  <!-- Outer frame -->
  <rect x="3" y="3" width="74" height="74" fill="none" stroke="#C43F24" stroke-width="1"/>
  <!-- Corner tick marks -->
  <line x1="3" y1="3" x2="8" y2="3" stroke="#C43F24" stroke-width="1"/>
  <line x1="3" y1="3" x2="3" y2="8" stroke="#C43F24" stroke-width="1"/>
  <line x1="77" y1="3" x2="72" y2="3" stroke="#C43F24" stroke-width="1"/>
  <line x1="77" y1="3" x2="77" y2="8" stroke="#C43F24" stroke-width="1"/>
  <line x1="3" y1="77" x2="8" y2="77" stroke="#C43F24" stroke-width="1"/>
  <line x1="3" y1="77" x2="3" y2="72" stroke="#C43F24" stroke-width="1"/>
  <line x1="77" y1="77" x2="72" y2="77" stroke="#C43F24" stroke-width="1"/>
  <line x1="77" y1="77" x2="77" y2="72" stroke="#C43F24" stroke-width="1"/>
  <!-- Antenna mast -->
  <line x1="40" y1="54" x2="40" y2="32" stroke="#E3DBD2" stroke-width="1.5" fill="none"/>
  <!-- Antenna top -->
  <line x1="40" y1="32" x2="36" y2="38" stroke="#E3DBD2" stroke-width="1.5"/>
  <line x1="40" y1="32" x2="44" y2="38" stroke="#E3DBD2" stroke-width="1.5"/>
  <!-- Antenna tip marker -->
  <circle cx="40" cy="30" r="2" fill="none" stroke="#C43F24" stroke-width="1.5"/>
  <!-- Base / ground platform -->
  <line x1="32" y1="54" x2="48" y2="54" stroke="#E3DBD2" stroke-width="1.5"/>
  <line x1="30" y1="57" x2="50" y2="57" stroke="#E3DBD2" stroke-width="1"/>
  <!-- Signal waves (concentric arcs) -->
  <path d="M 31 44 A 10 10 0 0 1 49 44" fill="none" stroke="#C43F24" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 26 40 A 15 15 0 0 1 54 40" fill="none" stroke="#C43F24" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  <path d="M 21 36 A 20 20 0 0 1 59 36" fill="none" stroke="#C43F24" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <!-- Cross-support bars on mast -->
  <line x1="36" y1="44" x2="44" y2="44" stroke="#E3DBD2" stroke-width="1"/>
  <line x1="37" y1="48" x2="43" y2="48" stroke="#E3DBD2" stroke-width="1"/>
</svg>
