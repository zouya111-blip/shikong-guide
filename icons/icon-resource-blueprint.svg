<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <defs>
    <pattern id="grid-resource-bp" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#2A2928" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="80" height="80" fill="#1E2020"/>
  <rect width="80" height="80" fill="url(#grid-resource-bp)"/>
  <!-- Outer frame -->
  <rect x="3" y="3" width="74" height="74" fill="none" stroke="#C43F24" stroke-width="1"/>
  <!-- Corner ticks -->
  <line x1="3" y1="3" x2="8" y2="3" stroke="#C43F24" stroke-width="1"/>
  <line x1="3" y1="3" x2="3" y2="8" stroke="#C43F24" stroke-width="1"/>
  <line x1="77" y1="3" x2="72" y2="3" stroke="#C43F24" stroke-width="1"/>
  <line x1="77" y1="3" x2="77" y2="8" stroke="#C43F24" stroke-width="1"/>
  <line x1="3" y1="77" x2="8" y2="77" stroke="#C43F24" stroke-width="1"/>
  <line x1="3" y1="77" x2="3" y2="72" stroke="#C43F24" stroke-width="1"/>
  <line x1="77" y1="77" x2="72" y2="77" stroke="#C43F24" stroke-width="1"/>
  <line x1="77" y1="77" x2="77" y2="72" stroke="#C43F24" stroke-width="1"/>
  <!-- Iron barrel/drum body -->
  <rect x="26" y="22" width="28" height="34" rx="3" fill="none" stroke="#E3DBD2" stroke-width="1.8"/>
  <!-- Barrel rim top -->
  <rect x="24" y="20" width="32" height="5" rx="1.5" fill="none" stroke="#E3DBD2" stroke-width="1.5"/>
  <!-- Barrel rim bottom -->
  <rect x="24" y="52" width="32" height="5" rx="1.5" fill="none" stroke="#E3DBD2" stroke-width="1.5"/>
  <!-- Barrel banding lines -->
  <line x1="26" y1="32" x2="54" y2="32" stroke="#E3DBD2" stroke-width="1" opacity="0.6"/>
  <line x1="26" y1="42" x2="54" y2="42" stroke="#E3DBD2" stroke-width="1" opacity="0.6"/>
  <!-- Hazard warning symbol on barrel -->
  <line x1="38" y1="35" x2="42" y2="35" stroke="#C43F24" stroke-width="1.5"/>
  <line x1="40" y1="33" x2="40" y2="37" stroke="#C43F24" stroke-width="1.5"/>
  <!-- Gear fragment (partial gear, top-right corner) -->
  <path d="M 58 18 L 60 14 L 62 16 L 64 13 L 66 16 L 68 14 L 69 18 L 67 20 A 5 5 0 0 1 60 20 Z" fill="none" stroke="#C43F24" stroke-width="1.2"/>
  <circle cx="64" cy="21" r="2.5" fill="none" stroke="#C43F24" stroke-width="1"/>
  <!-- Small gear teeth on right side -->
  <path d="M 16 14 L 18 10 L 20 12 L 22 10 L 24 12 L 25 15 A 5 5 0 0 1 17 17 Z" fill="none" stroke="#E3DBD2" stroke-width="1" opacity="0.6"/>
</svg>
