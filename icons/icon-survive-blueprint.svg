<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <defs>
    <pattern id="grid-survive-bp" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#2A2928" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="80" height="80" fill="#1E2020"/>
  <rect width="80" height="80" fill="url(#grid-survive-bp)"/>
  <!-- Outer frame -->
  <rect x="3" y="3" width="74" height="74" fill="none" stroke="#C43F24" stroke-width="1"/>
  <!-- Corner ticks -->
  <line x1="3" y1="3" x2="8" y2="3" stroke="#C43F24" stroke-width="1"/>
  <line x1="3" y1="3" x2="3" y2="8" stroke="#C43F24" stroke-width="1"/>
  <line x1="77" y1="3" x2="72" y2="3" stroke="#C43F24" stroke-width="1"/>
  <line x1="77" y1="3" x2="77" y2="8" stroke="#C43F24" stroke-width="1"/>
  <line x1="3" y1="77" x2="8" y2="77" stroke="#C43F24" stroke-width="1"/>
  <line x1="3" y1="77" x2="3" y2="72" stroke="#C43F24" stroke-width="1"/>
  <line x1="77" y1="77" x2="72" y2="77" stroke="#C43F24" stroke-width="1"/>
  <line x1="77" y1="77" x2="77" y2="72" stroke="#C43F24" stroke-width="1"/>
  <!-- Campfire - logs/wood base -->
  <line x1="28" y1="56" x2="44" y2="50" stroke="#E3DBD2" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="56" x2="36" y2="50" stroke="#E3DBD2" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="58" x2="54" y2="58" stroke="#E3DBD2" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Log cross-section circles -->
  <circle cx="27" cy="57" r="3" fill="none" stroke="#E3DBD2" stroke-width="1"/>
  <circle cx="53" cy="57" r="3" fill="none" stroke="#E3DBD2" stroke-width="1"/>
  <!-- Flame - main -->
  <path d="M 40 20 C 38 26 33 30 35 38 C 37 44 43 44 45 38 C 47 30 42 26 40 20 Z" fill="none" stroke="#C43F24" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Flame - inner -->
  <path d="M 40 28 C 39 31 37 34 38 39 C 39 42 41 42 42 39 C 43 34 41 31 40 28 Z" fill="none" stroke="#C43F24" stroke-width="1" opacity="0.7"/>
  <!-- Left flame tendril -->
  <path d="M 37 36 C 33 32 32 26 35 22" fill="none" stroke="#C43F24" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <!-- Right flame tendril -->
  <path d="M 43 36 C 47 32 48 26 45 22" fill="none" stroke="#C43F24" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <!-- Ember base glow area -->
  <ellipse cx="40" cy="51" rx="8" ry="2" fill="none" stroke="#C43F24" stroke-width="1" opacity="0.5"/>
</svg>
