<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <!-- Background -->
  <rect width="80" height="80" fill="#3D1D1D"/>
  <!-- Outer frame -->
  <path d="M 4 4 L 76 4 L 76.5 76 L 3.5 75.5 Z" fill="none" stroke="#882818" stroke-width="2"/>
  <!-- Corner rivets -->
  <circle cx="10" cy="10" r="3" fill="#E3DBD2"/>
  <circle cx="70" cy="10" r="3" fill="#E3DBD2"/>
  <circle cx="10" cy="70" r="3" fill="#E3DBD2"/>
  <circle cx="70" cy="70" r="3" fill="#E3DBD2"/>
  <!-- Flame - outer glow layer -->
  <path d="M 40 16 C 37 24 30 30 33 40 C 35 47 45 47 47 40 C 50 30 43 24 40 16 Z" fill="#882818"/>
  <!-- Flame - main body -->
  <path d="M 40 18 C 38 25 32 31 35 40 C 37 46 43 46 45 40 C 48 31 42 25 40 18 Z" fill="#C43F24"/>
  <!-- Flame - inner bright core -->
  <path d="M 40 26 C 39 30 37 34 38 39 C 39 43 41 43 42 39 C 43 34 41 30 40 26 Z" fill="#882818" opacity="0.5"/>
  <!-- Left side tendril -->
  <path d="M 34 36 C 29 30 30 22 34 18" fill="#882818" stroke="none"/>
  <!-- Right tendril -->
  <path d="M 46 36 C 51 30 50 22 46 18" fill="#882818" stroke="none"/>
  <!-- Log left -->
  <rect x="22" y="52" width="18" height="5" rx="2.5" fill="#882818" transform="rotate(-15, 31, 54.5)"/>
  <!-- Log left highlight -->
  <rect x="22" y="52" width="18" height="2" rx="1" fill="#C43F24" opacity="0.5" transform="rotate(-15, 31, 53)"/>
  <!-- Log right -->
  <rect x="40" y="52" width="18" height="5" rx="2.5" fill="#882818" transform="rotate(15, 49, 54.5)"/>
  <!-- Log right highlight -->
  <rect x="40" y="52" width="18" height="2" rx="1" fill="#C43F24" opacity="0.5" transform="rotate(15, 49, 53)"/>
  <!-- Ground ember line -->
  <rect x="26" y="57" width="28" height="3" rx="1.5" fill="#882818"/>
  <rect x="28" y="57" width="24" height="1.5" rx="1" fill="#C43F24" opacity="0.6"/>
</svg>
